<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reader</title>
    <link rel="stylesheet" href="pdf-reader.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    
    <div id="loading-screen" class="loading active">
        <l-waveform size="35" stroke="3.5" speed="1" color="darkmagenta"></l-waveform>
        <h2>SENTINELA</h2>
    </div>

    <div id="pdf-container" class="content"></div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/waveform.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="pdf-reader.js"></script>
</body>
</html>
